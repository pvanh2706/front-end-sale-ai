<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Mở giao diện</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: #f5f7ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(70,95,255,.12);
    }
    .logo {
      width: 44px; height: 44px;
      background: #465fff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .logo svg { width: 24px; height: 24px; color: white; }
    h1 { font-size: 20px; font-weight: 700; color: #101828; margin-bottom: 4px; }
    p  { font-size: 14px; color: #667085; margin-bottom: 32px; }
    .btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 14px 18px;
      border-radius: 12px; border: 1.5px solid #e4e7ec;
      background: white; cursor: pointer;
      text-decoration: none; color: #101828;
      font-size: 15px; font-weight: 600;
      transition: all .15s;
      margin-bottom: 12px;
    }
    .btn:hover { border-color: #465fff; background: #f2f7ff; color: #465fff; }
    .btn:hover .icon { background: #465fff; }
    .btn:last-child { margin-bottom: 0; }
    .icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: #f2f4f7;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .icon svg { width: 18px; height: 18px; }
    .btn:hover .icon svg { color: white; }
    .note {
      margin-top: 28px; padding: 12px 16px;
      background: #f9fafb; border-radius: 10px;
      font-size: 12px; color: #667085; line-height: 1.6;
    }
    .note b { color: #344054; }
    .divider {
      height: 1px; background: #e4e7ec;
      margin: 24px 0;
    }
    .label {
      font-size: 11px; font-weight: 600; color: #98a2b3;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.82m5.84-2.56a14.99 14.99 0 006.16-12.12A14.99 14.99 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.82m2.56-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
      </svg>
    </div>
    <h1>AI Sales Agent</h1>
    <p>Mở giao diện trên dev server</p>

    <div class="label">Trang Auth</div>

    <a class="btn" href="http://localhost:5173/login" target="_blank">
      <span class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
        </svg>
      </span>
      Trang Đăng nhập
    </a>

    <a class="btn" href="http://localhost:5173/register" target="_blank">
      <span class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM3 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 019.374 21c-2.331 0-4.512-.645-6.374-1.766z"/>
        </svg>
      </span>
      Trang Đăng ký
    </a>

    <div class="divider"></div>

    <div class="label">Trang chính</div>

    <a class="btn" href="http://localhost:5173/" target="_blank">
      <span class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
        </svg>
      </span>
      Dashboard (cần đăng nhập)
    </a>

    <div class="note">
      <b>Dev server phải đang chạy</b> tại localhost:5173<br>
      Đăng nhập thử: <b>admin</b> / <b>123</b>
    </div>
  </div>
</body>
</html>
