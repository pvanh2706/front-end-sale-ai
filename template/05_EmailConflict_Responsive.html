        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);

            .bottom-sheet {
                transform: translateY(0);
                transition: transform 0.3s ease-out;
            }

<body class="bg-surface font-body-md text-on-background min-h-screen relative flex items-center justify-center">
<!-- Background Content Mockup (Registration Screen) -->
<main class="w-full h-full absolute inset-0 z-0 flex flex-col pointer-events-none opacity-40">
<header class="sticky top-0 z-40 flex justify-between items-center px-6 h-16 w-full bg-white/80 backdrop-blur-md border-b border-gray-200">
<div class="text-xl font-bold tracking-tight text-gray-900">SalesFlow AI</div>
<div class="flex items-center gap-4">
<span class="font-inter antialiased text-sm font-medium text-gray-500">Đăng ký tài khoản</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest"></div>
</div>
</header>
<div class="flex-1 flex items-center justify-center p-6">
<div class="max-w-md w-full space-y-6">
<div class="h-10 w-full bg-surface-container rounded"></div>
<div class="h-10 w-full bg-surface-container rounded"></div>
<div class="h-10 w-full bg-surface-container rounded"></div>
<div class="h-12 w-full bg-primary-container rounded"></div>
</div>
</div>
</main>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-50 bg-[#111827]/50 flex items-center justify-center md:p-6">
<!-- Responsive Container: Modal on Desktop / Bottom Sheet on Mobile -->
<div class="relative w-full max-w-[480px] bg-white md:rounded-[16px] md:modal-shadow transition-all duration-300 bottom-0 absolute md:relative md:bottom-auto rounded-t-[24px] bottom-sheet h-[60%] md:h-auto overflow-hidden">
<!-- Mobile Handle Bar -->
<div class="flex justify-center pt-4 md:hidden">
<div class="w-10 h-1 bg-gray-300 rounded-full"></div>
</div>
<!-- Close Button -->
<button aria-label="Close" class="absolute right-4 top-4 md:right-6 md:top-6 p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-500">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Content Area -->
<div class="p-8 md:p-8 pt-10 md:pt-12 flex flex-col items-center text-center">
<!-- Icon Warning -->
<div class="w-16 h-16 rounded-full bg-[#FEF3C7] flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-[#F59E0B] text-4xl" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<!-- Title -->
<h2 class="font-h3 text-h3 text-on-surface mb-3">Email đã được đăng ký</h2>
<!-- Description -->
<p class="font-body-sm text-on-surface-variant mb-8 max-w-sm">
                    Email <span class="font-semibold text-on-surface">ban@congty.com</span> đã có tài khoản trên AI Sales Agent. Bạn có thể đăng nhập bằng email này hoặc dùng email khác để tạo tài khoản mới.
                </p>
<!-- Actions -->
<div class="w-full space-y-3">
<button class="w-full h-[48px] bg-[#2563EB] text-white font-label-md rounded-lg hover:bg-blue-700 active:scale-95 transition-all duration-150">
                        Chuyển đến đăng nhập
                    </button>
<button class="w-full h-[48px] border border-outline-variant text-on-surface font-label-md rounded-lg hover:bg-gray-50 active:scale-95 transition-all duration-150">
                        Dùng email khác
                    </button>
</div>
<!-- Footer Link -->
<div class="mt-8">
<a class="font-label-md text-primary-container hover:underline flex items-center gap-1" href="#">
                        Quên mật khẩu? <span class="font-normal text-on-surface-variant">Khôi phục tại đây</span>
</a>
</div>
</div>
<!-- Bottom Graphic Decor (Subtle AI Theme) -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container via-secondary-container to-primary-container opacity-20"></div>
</div>
</div>
