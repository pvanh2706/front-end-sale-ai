<style>
    body {
      background-color: #F5F9FF;
    }
    .ambient-shadow {
      box-shadow: 0 2px 8px rgba(107, 163, 232, 0.08);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="h-full font-body-md text-on-surface">
<!-- Main Container -->
<main class="min-h-screen flex flex-col px-container-margin py-xl max-w-md mx-auto">
<!-- Top Section: Logo & Welcome -->
<header class="flex flex-col items-center text-center mt-xl mb-xxl">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md ambient-shadow">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="rocket_launch">rocket_launch</span>
</div>
<h1 class="font-h1 text-h2 text-on-primary-container mb-xs">Sales.AI</h1>
<p class="font-body-md text-on-surface-variant">Chào mừng bạn quay trở lại với giải pháp AI thông minh</p>
</header>
<!-- Middle Section: Login Form -->
<section class="flex-grow">
<div class="bg-surface-container-lowest rounded-[16px] p-lg ambient-shadow space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block ml-xs">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-outline-variant rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block ml-xs">Mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-outline-variant rounded-xl py-3 pl-12 pr-12 focus:ring-2 focus:ring-primary-container focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Quên mật khẩu?</a>
</div>
</div>
</section>
<!-- Bottom Section: Actions -->
<footer class="mt-xl space-y-xl">
<div class="space-y-md">
<!-- Primary Login Button -->
<button class="w-full bg-primary-container text-on-primary font-label-md py-4 rounded-[10px] shadow-lg hover:brightness-105 active:scale-[0.98] transition-all">
          Đăng nhập
        </button>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="font-label-sm text-outline">Hoặc đăng nhập với</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<!-- Social Login Icons -->
<div class="flex justify-center gap-lg">
<button class="w-14 h-14 rounded-full bg-surface-container-lowest ambient-shadow flex items-center justify-center hover:bg-surface-container transition-colors">
<img alt="Google" class="w-6 h-6" data-alt="Official Google G logo in flat vector style with brand colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqdqEO-PkcuB8lk29jMea73iRxEpy1FIih8UHI5JLA66BySjTyXlXXioUtr1EFqp5-v5vkYjXHSQBKc9TveML3Pha3tBa2D5dNP-ayjtYZgBPDphKVYVYwTYtbte7NrDwsFRw14YygGwRjLs-6mA5qvMfFCtNWjjvKjnQPaG-4DioZvAa5b1Q3dzF5sxfwDLZDtGnJYwHFaDVlsi8hJo-OH2SPGhK7mRsRUMCciFDviph14w5TjKZ6Zd-2doyBXNHp00rEoaDMMWzx"/>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-lowest ambient-shadow flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[#1877F2]" data-icon="facebook" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-lowest ambient-shadow flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
</button>
</div>
</div>
<!-- Sign Up Link -->
<div class="text-center">
<p class="font-body-sm text-on-surface-variant">
          Chưa có tài khoản? 
          <a class="font-label-md text-primary ml-1 hover:underline" href="#">Đăng ký ngay</a>
</p>
</div>
<!-- Shared Components Footer Integration -->
<div class="flex flex-col items-center gap-sm pt-md border-t border-blue-100/30">
<div class="flex gap-md">
<span class="font-label-sm text-outline hover:text-primary cursor-pointer transition-colors">Privacy Policy</span>
<span class="font-label-sm text-outline hover:text-primary cursor-pointer transition-colors">Terms of Service</span>
</div>
<p class="font-label-sm text-outline opacity-60">© 2024 Sales.AI. All rights reserved.</p>
</div>
</footer>
</main>
<!-- Decorative Background Element -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-72 h-72 bg-tertiary-container/10 blur-[120px] rounded-full"></div>
</body></html>
